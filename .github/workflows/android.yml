name: Android · Play

# Build the signed Android App Bundle and stage it on BOTH closed-testing tracks
# ("alpha" + the custom "Google Group - Alpha") on a version tag (v*) — the
# Android counterpart to ios.yml (which ships the iOS build to TestFlight, the
# iOS closed-testing equivalent). A manual workflow_dispatch stages on a single
# chosen track instead. Reuses the local
# release tooling: the upload keystore for signing + tool/play_upload_aab.py
# (service account) for the upload, exactly as documented in CLAUDE.md.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   ANDROID_KEYSTORE_BASE64      base64 of the upload keystore (.jks)        — from the BACKED-UP keystore
#   ANDROID_KEY_ALIAS            key alias inside the keystore               — from local android/key.properties
#   ANDROID_KEY_PASSWORD         password for that key                       — from local android/key.properties
#   ANDROID_STORE_PASSWORD       password for the keystore                   — from local android/key.properties
#   PLAY_STORE_KEY_JSON_BASE64   base64 of fastlane/play-store-key.json      — the Play service-account key
#
# Make a base64 secret with:  base64 -w0 <file>   (macOS: base64 -i <file>)
# Without these the build still runs but falls back to the DEBUG signing key,
# which Play rejects on upload — so all five are mandatory for the upload to land.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      track:
        description: "Play track to stage the release on (manual run only)"
        default: "alpha"
        type: choice
        options: ["alpha", "Google Group - Alpha", internal, beta, production]

jobs:
  play:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.4"
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Install signing keystore & key.properties
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "::error::ANDROID_KEYSTORE_BASE64 is empty — release would sign with the debug key and Play would reject it."
            exit 1
          fi
          KEYSTORE="$RUNNER_TEMP/upload-keystore.jks"
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$KEYSTORE"
          # storeFile is read via Gradle file(...) — an absolute path resolves as-is.
          cat > android/key.properties <<EOF
          storeFile=$KEYSTORE
          storePassword=$ANDROID_STORE_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          keyPassword=$ANDROID_KEY_PASSWORD
          EOF

      - name: Install Play service-account key
        env:
          PLAY_STORE_KEY_JSON_BASE64: ${{ secrets.PLAY_STORE_KEY_JSON_BASE64 }}
        run: |
          mkdir -p fastlane
          echo "$PLAY_STORE_KEY_JSON_BASE64" | base64 --decode > fastlane/play-store-key.json

      - name: Build release App Bundle
        run: flutter build appbundle --release

      - name: Upload to Play
        env:
          DISPATCH_TRACK: ${{ github.event.inputs.track }}
        run: |
          python3 -m pip install --quiet google-api-python-client google-auth
          if [ -n "$DISPATCH_TRACK" ]; then
            # Manual run: stage on the chosen track only.
            python3 tool/play_upload_aab.py "$DISPATCH_TRACK"
          else
            # Tag push (v*): stage on BOTH closed-testing tracks.
            python3 tool/play_upload_aab.py "alpha" "Google Group - Alpha"
          fi
