name: Test · analyze + flutter test

# Runs the Dart analyzer and the full test suite (incl. Trends golden/pixel
# tests) on every push and PR. Linux is the canonical platform for goldens:
# this ubuntu runner and the local `flutter` distrobox share the same prebuilt
# linux-x64 engine, so they rasterize identically. Off Linux, golden comparison
# is skipped (see test/flutter_test_config.dart) — so devs on Windows/macOS stay
# green and this job is the source of truth.
#
# IMPORTANT: flutter-version must match the engine the committed goldens were
# generated with (the dev distrobox — currently 3.44.4). When you bump Flutter,
# regenerate the goldens on Linux (`flutter test --update-goldens test/golden`)
# in the same version and bump it here (and in ios.yml, kept in lockstep).

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.44.4"
          channel: stable
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Upload golden failure diffs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: golden-failures
          path: test/golden/failures/
          if-no-files-found: ignore
